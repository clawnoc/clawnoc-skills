AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: Cost Anomaly Alert

Resources:
  CostAlertFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: lambda_function.lambda_handler
      Runtime: python3.12
      CodeUri: .
      MemorySize: 128
      Timeout: 60
      Environment:
        Variables:
          DAILY_THRESHOLD: "100"
          GROUP_BY_TAG: "team"
          MODE: "daily"
          NOTIFY_TYPE: "slack"
          WEBHOOK_URL: ""
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - ce:GetCostAndUsage
              Resource: "*"
      Events:
        DailyCheck:
          Type: Schedule
          Properties:
            Schedule: cron(0 8 * * ? *)
            Description: Daily cost check at 08:00 UTC
