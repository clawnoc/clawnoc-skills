AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: Idle Resource Scanner

Resources:
  IdleScanFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: lambda_function.lambda_handler
      Runtime: python3.12
      CodeUri: .
      MemorySize: 256
      Timeout: 300
      Environment:
        Variables:
          LOOKBACK_DAYS: "7"
          CPU_THRESHOLD: "5.0"
          NAT_BYTES_THRESHOLD: "1073741824"
          NOTIFY_TYPE: "slack"
          WEBHOOK_URL: ""
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - ec2:DescribeInstances
                - ec2:DescribeVolumes
                - ec2:DescribeAddresses
                - ec2:DescribeNatGateways
                - rds:DescribeDBInstances
                - cloudwatch:GetMetricStatistics
              Resource: "*"
      Events:
        WeeklyCheck:
          Type: Schedule
          Properties:
            Schedule: cron(0 3 ? * MON *)
            Description: Weekly idle resource scan
